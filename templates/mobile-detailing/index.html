<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mobile Detailing Template</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="site-header">
<a class="brand" href="#top">Mobile Detail Demo</a>
<nav class="site-nav">
<a href="#services">Services</a>
<a href="#quote">Quote</a>
</nav>
</header>
<main id="top">
<section class="hero">
<div class="container">
<h1>Mobile detailing website template.</h1>
<p>A starter website for local detailing businesses.</p>
<a class="button primary" href="#quote">Get Quote</a>
</div>
</section>
<section id="services" class="section-padding">
<div class="container card-grid three">
<div class="service-card"><h2>Interior</h2><p>Interior cleaning service section.</p></div>
<div class="service-card"><h2>Exterior</h2><p>Exterior cleaning service section.</p></div>
<div class="service-card"><h2>Packages</h2><p>Package pricing and service section.</p></div>
</div>
</section>
<section id="quote" class="section-padding">
<div class="container">
<form class="contact-form" data-demo-form>
<input placeholder="Name">
<input placeholder="Contact">
<textarea placeholder="Message"></textarea>
<button class="button primary">Submit</button>
<p data-form-note></p>
</form>
</div>
</section>
</main>
<footer class="site-footer">
<div class="container">
<p>&copy; <span data-year></span> Mobile Detail Demo.</p>
</div>
</footer>
<script src="script.js"></script>
</body>
</html>
